<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>180 Go | Simulador Inteligente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main>
  <div class="card">
    <h2>180 Go</h2>
    <p class="subtitle">Simulador inteligente de corridas</p>

    <form id="form">
      <input type="text" id="origem" placeholder="Origem (ex: Centro)" required>
      <input type="text" id="destino" placeholder="Destino (ex: Aeroporto)" required>

      <label>Demanda</label>
      <select id="demanda">
        <option value="0.8">Baixa</option>
        <option value="1" selected>Média</option>
        <option value="1.3">Alta</option>
        <option value="1.6">Muito Alta</option>
      </select>

      <button type="submit">Calcular corrida</button>
    </form>

    <div id="resultado"></div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
